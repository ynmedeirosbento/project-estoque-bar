<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <title>Contagem</title>
    <link rel="manifest" href="/static/manifest.json">
</head>
<body class="contagem-page" data-nome="{{ nome }}" data-data="{{ data }}">
    <table>
        <tr>
            <th>Produto</th>
            <th>Classes</th>
            <th>Embalagem</th>
            <th>Quantidade(unidade)</th>
            <th>Excluir</th>
        </tr>
        {%for item in itens%}
         <tr>
            <td>{{ item[0] }}</td>
            <td>{{ item[1] }}</td>
            <td>{{ item[2] }}</td>
            <td><input type="number" value="{{item[3]}}" min="0" data-id="{{item[4]}}"></td>
            <td><button class="btn-excluir-item" data-id="{{ item[4] }}">🗑️</button></td>
        </tr>   
        {% endfor %}
    </table>
    <button id="btn-finalizar">Finalizar contagem</button>
    <div id="modal-resumo">
        <div id="resumo-content">
                <h2>Resumo da Contagem</h2>
                <table id="tabela-resumo">
                    <tr>
                        <th>Produto</th>
                        <th>Quantidade</th>
                    </tr>
                </table>
                <p>Total: <span id="total-geral">0</span> unidades</p>
                <button id="btn-fechar-resumo">Fechar</button>
                <button id="btn-whatsapp">Enviar por WhatsApp 📲</button>
        </div>
    </div>
    <a href="/home" id="btn-voltar-contagem">Voltar</a>
    <script src="{{ url_for('static', filename='contagem.js') }}"></script>
    </script>
    <script>
    if('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/service-worker.js')
    }
</script>
</body>
</html>
